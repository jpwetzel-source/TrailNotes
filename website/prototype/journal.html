<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal - TrailNotes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tw-theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap"
      rel="stylesheet"
    />
    <link href="prototype.css?v=3" rel="stylesheet" />
  </head>
  <body class="app-shell bg-surface font-body text-on-surface antialiased">
    <header class="app-top-bar">
      <a href="index.html" class="app-logo" aria-label="TrailNotes home, dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" fill="none" aria-hidden="true">
          <rect width="40" height="40" rx="10" fill="#006948" />
          <path fill="#C8F9E4" d="M10 27 18 14l4 4.5 9.5-10V27z" />
          <path fill="#fff" fill-opacity="0.45" d="M10 27 20.5 21.7 31 27z" />
        </svg>
      </a>
      <a href="profile.html" class="block h-10 w-10 shrink-0 overflow-hidden rounded-full bg-surface-container-high ring-1 ring-black/5 shadow-sm">
        <img
          alt="Profile"
          class="h-full w-full object-cover"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4lrsbE1lJkJEoNAeibVQgq-Zg-AUJP6nBLAXErRPAy4k5Q0SfiR1fr64-c7SCr1rGTGhZmjp8N1klfMDVv0SMkZGic8gTD9d-Lm9Uzw53WL0-NShFnYUCzwN1SeZPrAD2-moz_7gxDAPnA4VRBv-l5w_uNS_9hgk2HrVTS7x20eo-FM8BFnd7ZtvjwCzVZ2XOABOHZv_H10mSmr1_mQApBepkschsK1mX1KT6qh-fZaMBmtMpdpOOrHAiiq-OEmH9zi5jkpY8FP4"
        />
      </a>
    </header>

    <main class="app-main">
      <section class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div class="min-w-0">
          <h1 class="font-headline text-3xl text-on-surface">Journal</h1>
          <p class="mt-2 max-w-md text-sm text-on-surface-variant">
            Entries stay in this browser for now. They are easy to export later when you connect a backend.
          </p>
        </div>
        <a
          href="journal-entry.html"
          class="inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-br from-primary to-primary-container px-5 py-3 text-sm font-bold uppercase tracking-widest text-on-primary shadow-lg shadow-primary/20 no-underline active:scale-95 transition-transform"
        >
          <span class="material-symbols-outlined text-base">add</span>
          New entry
        </a>
      </section>

      <p
        id="journal-empty"
        class="rounded-xl border border-dashed border-outline-variant bg-surface-container-low/60 p-8 text-center text-sm text-on-surface-variant"
        hidden
      >
        No entries yet. Capture your first trail story with <strong class="text-on-surface">New entry</strong>.
      </p>

      <div id="journal-entries" class="min-h-[40vh]"></div>
    </main>

    <nav class="app-bottom-nav" aria-label="Primary">
      <a
        data-nav-tab="dashboard"
        href="index.html"
        class="prototype-nav__link flex flex-col items-center justify-center rounded-full px-5 py-2 no-underline transition-transform duration-200"
      >
        <span class="material-symbols-outlined prototype-nav__icon text-[22px]">dashboard</span>
        <span class="font-sans text-[11px] font-semibold">Dashboard</span>
      </a>
      <a
        data-nav-tab="trips"
        href="trips.html"
        class="prototype-nav__link flex flex-col items-center justify-center rounded-full px-5 py-2 no-underline transition-transform duration-200"
      >
        <span class="material-symbols-outlined prototype-nav__icon text-[22px]">map</span>
        <span class="font-sans text-[11px] font-semibold">Trips</span>
      </a>
      <a
        data-nav-tab="journal"
        href="journal.html"
        class="prototype-nav__link flex flex-col items-center justify-center rounded-full px-5 py-2 no-underline transition-transform duration-200"
        aria-current="page"
      >
        <span class="material-symbols-outlined prototype-nav__icon text-[22px]" style="font-variation-settings: 'FILL' 1">edit_note</span>
        <span class="font-sans text-[11px] font-semibold">Journal</span>
      </a>
    </nav>

    <script type="module" src="js/features/journal/journal-list-page.js?v=2"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal - TrailNotes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tw-theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap"
      rel="stylesheet"
    />
    <link href="prototype.css" rel="stylesheet" />
  </head>
  <body class="bg-surface font-body text-on-surface antialiased min-h-screen pb-36">
    <header
      class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-3xl shadow-[0_8px_32px_rgba(0,0,0,0.04)]"
    >
      <div class="flex items-center gap-3">
        <a
          href="index.html"
          class="text-emerald-800 dark:text-emerald-400 rounded-full p-1 hover:bg-white/30"
          aria-label="Home"
        >
          <span class="material-symbols-outlined">menu</span>
        </a>
        <a href="index.html" class="font-serif font-bold text-2xl tracking-tight text-emerald-900 dark:text-emerald-50 no-underline"
          >TrailNotes</a
        >
      </div>
      <a href="profile.html" class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden shadow-sm block">
        <img
          alt="Profile"
          class="w-full h-full object-cover"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4lrsbE1lJkJEoNAeibVQgq-Zg-AUJP6nBLAXErRPAy4k5Q0SfiR1fr64-c7SCr1rGTGhZmjp8N1klfMDVv0SMkZGic8gTD9d-Lm9Uzw53WL0-NShFnYUCzwN1SeZPrAD2-moz_7gxDAPnA4VRBv-l5w_uNS_9hgk2HrVTS7x20eo-FM8BFnd7ZtvjwCzVZ2XOABOHZv_H10mSmr1_mQApBepkschsK1mX1KT6qh-fZaMBmtMpdpOOrHAiiq-OEmH9zi5jkpY8FP4"
        />
      </a>
    </header>

    <main class="mt-24 px-6 max-w-2xl mx-auto">
      <section class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="font-headline text-4xl text-on-surface">Journal</h1>
          <p class="text-sm text-on-surface-variant mt-2 max-w-md">
            Entries stay in this browser for now. They are easy to export later when you connect a backend.
          </p>
        </div>
        <a
          href="journal-entry.html"
          class="inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-br from-primary to-primary-container px-5 py-3 text-sm font-bold uppercase tracking-widest text-on-primary shadow-lg shadow-primary/20 no-underline active:scale-95 transition-transform"
        >
          <span class="material-symbols-outlined text-base">add</span>
          New entry
        </a>
      </section>

      <p
        id="journal-empty"
        class="rounded-xl border border-dashed border-outline-variant bg-surface-container-low/60 p-8 text-center text-sm text-on-surface-variant"
        hidden
      >
        No entries yet. Capture your first trail story with <strong class="text-on-surface">New entry</strong>.
      </p>

      <div id="journal-entries" class="min-h-[40vh]"></div>
    </main>

    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white/70 dark:bg-slate-900/80 backdrop-blur-[30px]"
    >
      <a
        data-nav-tab="dashboard"
        href="index.html"
        class="prototype-nav__link flex flex-col items-center justify-center py-2 px-6 transition-transform duration-200 no-underline text-slate-500 dark:text-slate-400 hover:bg-white/40 dark:hover:bg-slate-700/40 rounded-full no-underline"
      >
        <span class="material-symbols-outlined prototype-nav__icon">dashboard</span>
        <span class="font-sans font-semibold text-[11px] mt-1">Dashboard</span>
      </a>
      <a
        data-nav-tab="trips"
        href="trips.html"
        class="prototype-nav__link flex flex-col items-center justify-center py-2 px-6 transition-transform duration-200 no-underline text-slate-500 dark:text-slate-400 hover:bg-white/40 dark:hover:bg-slate-700/40 rounded-full no-underline"
      >
        <span class="material-symbols-outlined prototype-nav__icon">map</span>
        <span class="font-sans font-semibold text-[11px] mt-1">Trips</span>
      </a>
      <a
        data-nav-tab="journal"
        href="journal.html"
        class="prototype-nav__link flex flex-col items-center justify-center py-2 px-6 transition-transform duration-200 no-underline bg-emerald-100/50 dark:bg-emerald-900/30 text-emerald-900 dark:text-emerald-100 rounded-full scale-90 no-underline"
        aria-current="page"
      >
        <span class="material-symbols-outlined prototype-nav__icon" style="font-variation-settings: 'FILL' 1">edit_note</span>
        <span class="font-sans font-semibold text-[11px] mt-1">Journal</span>
      </a>
    </nav>

    <script type="module" src="js/features/journal/journal-list-page.js"></script>
  </body>
</html>

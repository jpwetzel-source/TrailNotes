<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal - TrailNotes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tw-theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap"
      rel="stylesheet"
    />
    <link href="prototype.css?v=3" rel="stylesheet" />
  </head>
  <body class="app-shell bg-surface font-body text-on-surface antialiased">
    <header id="prototype-app-header" class="app-top-bar"></header>

    <main class="app-main">
      <section class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div class="min-w-0">
          <h1 class="font-headline text-3xl text-on-surface">Journal</h1>
          <p class="mt-2 max-w-md text-sm text-on-surface-variant">
            Entries stay in this browser for now. They are easy to export later when you connect a backend.
          </p>
        </div>
        <a
          href="journal-entry.html"
          class="inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-br from-primary to-primary-container px-5 py-3 text-sm font-bold uppercase tracking-widest text-on-primary shadow-lg shadow-primary/20 no-underline active:scale-95 transition-transform"
        >
          <span class="material-symbols-outlined text-base">add</span>
          New entry
        </a>
      </section>

      <p
        id="journal-empty"
        class="rounded-xl border border-dashed border-outline-variant bg-surface-container-low/60 p-8 text-center text-sm text-on-surface-variant"
        hidden
      >
        No entries yet. Capture your first trail story with <strong class="text-on-surface">New entry</strong>.
      </p>

      <div id="journal-entries" class="min-h-[40vh]"></div>
    </main>

    <nav id="prototype-app-bottom-nav" class="app-bottom-nav" aria-label="Primary"></nav>

    <script type="module" src="js/core/boot-nav.js?v=4"></script>
    <script type="module" src="js/features/journal/journal-list-page.js?v=3"></script>
  </body>
</html>

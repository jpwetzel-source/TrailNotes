<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Journeys - TrailNotes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tw-theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap"
      rel="stylesheet"
    />
    <link href="prototype.css?v=2" rel="stylesheet" />
    <style>
      body.trips-body {
        font-family: Manrope, sans-serif;
        background-image: radial-gradient(at 0% 0%, rgba(133, 248, 196, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(0, 105, 72, 0.05) 0px, transparent 50%);
        background-attachment: fixed;
      }
    </style>
  </head>
  <body class="app-shell trips-body bg-background text-on-background antialiased">
    <header class="app-top-bar">
      <div class="flex min-w-0 flex-1 items-center gap-3">
        <a href="index.html" class="app-back-btn" aria-label="Back to dashboard">
          <span class="material-symbols-outlined text-2xl">arrow_back</span>
        </a>
        <div class="min-w-0">
          <p class="text-[10px] font-label uppercase tracking-widest text-emerald-900/70">TrailNotes</p>
          <h1
            id="trips-page-title"
            class="font-headline truncate text-xl leading-tight text-emerald-950 sm:text-2xl"
          >
            My journeys
          </h1>
        </div>
      </div>
      <a href="profile.html" class="relative block shrink-0 rounded-full ring-1 ring-black/5">
        <img
          alt="Profile"
          class="h-10 w-10 rounded-full border-2 border-white/90 object-cover shadow-sm"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhOEpq8_3fsT43yxbgik5uCnKvJqFP-t7CFx7BSwt6qtXsm81q551GnnxgEvBQ2JodKpGsGEDqKQBPtkzdiUpvUYn8DmJJu6CpXIAedBCvnBnJpvSciVX8Z0LVZwiCCKW-0g2I-eZa4jiD-MFlk66YWxp84_BHvQ5DNOAOu4iV7OfVsIsaDp3VtwXTn4bP-m9JCTWsvQ4xgLMPSoLbt3gWWnGBYiXCLRWvgPC-doot-t4Rwp2GTN9phgvbUX8bMS5_e8mh_ERsz4Y"
        />
      </a>
    </header>

    <main class="app-main">
      <section class="mb-6">
        <p id="trips-page-subtitle" class="text-sm font-medium text-on-surface-variant/90">
          Your logged hikes and plans
        </p>
        <p id="trips-quick-stats" class="mt-2 text-xs font-bold uppercase tracking-wider text-slate-500"></p>
      </section>

      <section class="mb-6 space-y-4" aria-label="Journey feed controls">
        <div
          class="flex rounded-xl bg-surface-container-highest/90 p-1 gap-1 shadow-inner border border-white/30"
          role="tablist"
          aria-label="Journey source"
        >
          <button
            type="button"
            id="trips-tab-mine"
            role="tab"
            aria-selected="true"
            aria-controls="trips-list-root"
            class="flex-1 min-w-0 rounded-lg py-2.5 px-3 text-sm font-bold transition-colors bg-primary-fixed text-on-primary-fixed shadow-sm"
          >
            My journeys
          </button>
          <button
            type="button"
            id="trips-tab-community"
            role="tab"
            aria-selected="false"
            aria-controls="trips-list-root"
            class="flex-1 min-w-0 rounded-lg py-2.5 px-3 text-sm font-bold transition-colors text-on-surface-variant hover:bg-white/50"
          >
            Community
          </button>
        </div>
        <div class="relative">
          <span
            class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xl text-outline"
            aria-hidden="true"
            >search</span
          >
          <label id="trips-search-label" class="sr-only" for="trips-search">Search your journeys</label>
          <input
            id="trips-search"
            type="search"
            autocomplete="off"
            class="w-full rounded-xl border border-white/60 bg-white/50 py-3 pl-11 pr-4 text-sm text-on-background shadow-sm placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/30"
            placeholder="Search your routes, dates, or keywords"
          />
        </div>
      </section>

      <p id="trips-list-heading" class="mb-3 text-xs font-bold uppercase tracking-widest text-primary">Your saved routes</p>

      <div class="mb-8 flex gap-3 overflow-x-auto pb-2 no-scrollbar" role="group" aria-label="Filter by terrain">
        <button type="button" data-trip-chip="all" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          All trips
        </button>
        <button type="button" data-trip-chip="alpine" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          Alpine
        </button>
        <button type="button" data-trip-chip="forests" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          Forests
        </button>
        <button type="button" data-trip-chip="coastal" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          Coastal
        </button>
      </div>

      <div id="trips-list-root" class="space-y-8" role="tabpanel" aria-live="polite"></div>
    </main>

    <nav class="app-bottom-nav" aria-label="Primary">
      <a
        data-nav-tab="dashboard"
        href="index.html"
        class="prototype-nav__link flex flex-col items-center justify-center rounded-full px-5 py-2 no-underline transition-transform duration-200"
      >
        <span class="material-symbols-outlined prototype-nav__icon text-[22px]">dashboard</span>
        <span class="font-sans text-[11px] font-semibold">Dashboard</span>
      </a>
      <a
        data-nav-tab="trips"
        href="trips.html"
        class="prototype-nav__link flex flex-col items-center justify-center rounded-full px-5 py-2 no-underline transition-transform duration-200"
      >
        <span class="material-symbols-outlined prototype-nav__icon text-[22px]">map</span>
        <span class="font-sans text-[11px] font-semibold">Trips</span>
      </a>
      <a
        data-nav-tab="journal"
        href="journal.html"
        class="prototype-nav__link flex flex-col items-center justify-center rounded-full px-5 py-2 no-underline transition-transform duration-200"
      >
        <span class="material-symbols-outlined prototype-nav__icon text-[22px]">edit_note</span>
        <span class="font-sans text-[11px] font-semibold">Journal</span>
      </a>
    </nav>

    <script type="module" src="js/features/trips/trips-page.js?v=4"></script>
  </body>
</html>

<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journeys - TrailNotes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tw-theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap"
      rel="stylesheet"
    />
    <link href="prototype.css" rel="stylesheet" />
    <style>
      body.trips-body {
        font-family: Manrope, sans-serif;
        background-image: radial-gradient(at 0% 0%, rgba(133, 248, 196, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(0, 105, 72, 0.05) 0px, transparent 50%);
        background-attachment: fixed;
      }
    </style>
  </head>
  <body class="trips-body bg-background text-on-background min-h-screen pb-32">
    <header
      class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-3xl shadow-[0_8px_32px_rgba(0,0,0,0.04)]"
    >
      <div class="flex items-center gap-3">
        <a
          href="index.html"
          class="flex items-center justify-center p-2 rounded-full hover:bg-white/20 transition-colors active:scale-95 duration-150 text-emerald-800"
          aria-label="Home"
        >
          <span class="material-symbols-outlined">menu</span>
        </a>
        <a href="index.html" class="font-serif font-bold text-2xl tracking-tight text-emerald-900 no-underline">TrailNotes</a>
      </div>
      <a href="profile.html" class="relative block">
        <img
          alt="Profile"
          class="w-10 h-10 rounded-full border-2 border-white object-cover shadow-sm"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhOEpq8_3fsT43yxbgik5uCnKvJqFP-t7CFx7BSwt6qtXsm81q551GnnxgEvBQ2JodKpGsGEDqKQBPtkzdiUpvUYn8DmJJu6CpXIAedBCvnBnJpvSciVX8Z0LVZwiCCKW-0g2I-eZa4jiD-MFlk66YWxp84_BHvQ5DNOAOu4iV7OfVsIsaDp3VtwXTn4bP-m9JCTWsvQ4xgLMPSoLbt3gWWnGBYiXCLRWvgPC-doot-t4Rwp2GTN9phgvbUX8bMS5_e8mh_ERsz4Y"
        />
      </a>
    </header>

    <main class="pt-24 px-6 max-w-2xl mx-auto">
      <section class="mb-6">
        <h1 id="trips-page-title" class="font-serif font-bold text-4xl text-on-background mb-1 leading-tight">My journeys</h1>
        <p id="trips-page-subtitle" class="text-on-surface-variant font-medium opacity-80 text-sm">
          Your logged hikes and plans
        </p>
        <p id="trips-quick-stats" class="mt-3 text-xs font-bold uppercase tracking-wider text-slate-500"></p>
      </section>

      <section class="mb-6 space-y-4" aria-label="Journey feed controls">
        <div
          class="flex rounded-xl bg-surface-container-highest/90 p-1 gap-1 shadow-inner border border-white/30"
          role="tablist"
          aria-label="Journey source"
        >
          <button
            type="button"
            id="trips-tab-mine"
            role="tab"
            aria-selected="true"
            aria-controls="trips-list-root"
            class="flex-1 min-w-0 rounded-lg py-2.5 px-3 text-sm font-bold transition-colors bg-primary-fixed text-on-primary-fixed shadow-sm"
          >
            My journeys
          </button>
          <button
            type="button"
            id="trips-tab-community"
            role="tab"
            aria-selected="false"
            aria-controls="trips-list-root"
            class="flex-1 min-w-0 rounded-lg py-2.5 px-3 text-sm font-bold transition-colors text-on-surface-variant hover:bg-white/50"
          >
            Community
          </button>
        </div>
        <div class="relative">
          <span
            class="material-symbols-outlined pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xl text-outline"
            aria-hidden="true"
            >search</span
          >
          <label class="sr-only" for="trips-search">Search journeys</label>
          <input
            id="trips-search"
            type="search"
            autocomplete="off"
            class="w-full rounded-xl border border-white/60 bg-white/50 py-3 pl-11 pr-4 text-sm text-on-background shadow-sm placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/30"
            placeholder="Search title, place, or friend"
          />
        </div>
      </section>

      <div class="mb-8 flex gap-3 overflow-x-auto pb-2 no-scrollbar" role="group" aria-label="Filter by terrain">
        <button type="button" data-trip-chip="all" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          All trips
        </button>
        <button type="button" data-trip-chip="alpine" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          Alpine
        </button>
        <button type="button" data-trip-chip="forests" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          Forests
        </button>
        <button type="button" data-trip-chip="coastal" class="shrink-0 rounded-full px-6 py-2 text-sm font-bold transition-colors">
          Coastal
        </button>
      </div>

      <div id="trips-list-root" class="space-y-8 pb-8" role="tabpanel" aria-live="polite"></div>
    </main>

    <nav
      class="fixed bottom-0 left-0 z-50 flex justify-around items-center px-4 py-3 bg-white/70 dark:bg-slate-900/80 backdrop-blur-[30px] rounded-full mx-6 mb-8 shadow-[0_12px_32px_rgba(23,28,31,0.06)] w-[calc(100%-3rem)]"
    >
      <a
        data-nav-tab="dashboard"
        href="index.html"
        class="prototype-nav__link flex flex-col items-center justify-center py-2 px-6 transition-transform duration-200 no-underline text-slate-500 dark:text-slate-400 hover:bg-white/40 dark:hover:bg-slate-700/40 rounded-full no-underline"
      >
        <span class="material-symbols-outlined prototype-nav__icon">dashboard</span>
        <span class="font-sans font-semibold text-[11px]">Dashboard</span>
      </a>
      <a
        data-nav-tab="trips"
        href="trips.html"
        class="prototype-nav__link flex flex-col items-center justify-center py-2 px-6 transition-transform duration-200 no-underline text-slate-500 dark:text-slate-400 hover:bg-white/40 dark:hover:bg-slate-700/40 rounded-full no-underline"
      >
        <span class="material-symbols-outlined prototype-nav__icon">map</span>
        <span class="font-sans font-semibold text-[11px]">Trips</span>
      </a>
      <a
        data-nav-tab="journal"
        href="journal.html"
        class="prototype-nav__link flex flex-col items-center justify-center py-2 px-6 transition-transform duration-200 no-underline text-slate-500 dark:text-slate-400 hover:bg-white/40 dark:hover:bg-slate-700/40 rounded-full no-underline"
      >
        <span class="material-symbols-outlined prototype-nav__icon">edit_note</span>
        <span class="font-sans font-semibold text-[11px]">Journal</span>
      </a>
    </nav>

    <script type="module" src="js/features/trips/trips-page.js"></script>
  </body>
</html>

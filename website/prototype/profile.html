<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        if (document.querySelector("base[data-trailnotes-prototype-base]")) return;
        var path = location.pathname.replace(/\/+$/, "");
        if (path === "") path = "/";
        var basePath;
        if (path === "/") {
          basePath = "/";
        } else {
          var lastSlash = path.lastIndexOf("/");
          var last = path.slice(lastSlash + 1);
          var isHtml = /\.html?$/i.test(last);
          basePath = isHtml ? path.slice(0, lastSlash + 1) || "/" : path + "/";
        }
        var b = document.createElement("base");
        b.href = basePath;
        b.setAttribute("data-trailnotes-prototype-base", "1");
        var cs = document.querySelector("meta[charset]");
        if (cs && cs.parentNode) cs.parentNode.insertBefore(b, cs.nextSibling);
        else document.head.prepend(b);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - TrailNotes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tw-theme.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Noto+Serif:ital,wght@0,700;1,700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap"
      rel="stylesheet"
    />
    <link href="prototype.css?v=3" rel="stylesheet" />
  </head>

              />
            </div>
            <button

        <div class="grid grid-cols-3 gap-4">

            <span class="block font-headline text-2xl font-bold text-on-surface">142</span>

        <div class="pt-8 flex justify-center">

            Sign Out

        </div>
      </div>
    </main>

    <nav id="prototype-app-bottom-nav" class="app-bottom-nav" aria-label="Primary"></nav>

    <script type="module" src="js/core/boot-nav.js?v=5"></script>
  </body>
</html>
